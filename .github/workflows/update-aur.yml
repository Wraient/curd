name: Update AUR Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-aur:
    runs-on: ubuntu-24.04
    if: github.repository == 'Wraient/curd'
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git openssh-client makepkg

      - name: Resolve release version and checksum
        id: release
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "Release tag is empty"
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          ASSET_URL="https://github.com/Wraient/curd/releases/download/${TAG_NAME}/curd-linux-x86_64"

          TMP_ASSET="$(mktemp)"
          curl -fL --retry 3 --retry-all-errors --connect-timeout 20 "$ASSET_URL" -o "$TMP_ASSET"
          SHA256="$(sha256sum "$TMP_ASSET" | awk '{print $1}')"
          rm -f "$TMP_ASSET"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Configure SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY || secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing secret: AUR_SSH_PRIVATE_KEY (or AUR_SSH_KEY)"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/aur_deploy

          if [ ! -s ~/.ssh/aur_deploy ]; then
            echo "SSH key file is empty after writing secret"
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/aur_deploy >/dev/null 2>&1; then
            echo "Invalid SSH private key in secret (or key is passphrase-protected)"
            exit 1
          fi

          chmod 600 ~/.ssh/aur_deploy
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Clone AUR repository
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes
        run: |
          set -euo pipefail
          git clone --depth 1 ssh://aur@aur.archlinux.org/curd.git aur-curd

      - name: Update AUR package files
        working-directory: aur-curd
        run: |
          set -euo pipefail

          sed -i "s/^pkgver=.*/pkgver=${{ steps.release.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s|^source=.*|source=(\"https://github.com/Wraient/curd/releases/download/v\${pkgver}/curd-linux-x86_64\")|" PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${{ steps.release.outputs.sha256 }}')|" PKGBUILD

          makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push to AUR
        working-directory: aur-curd
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add PKGBUILD .SRCINFO
          git commit -m "Update to version ${{ steps.release.outputs.version }}"
          git push origin HEAD:master

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/aur_deploy
